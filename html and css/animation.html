<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Advanced CSS Animations</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
</head>
<style>
    body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(to right, #667eea, #764ba2);
    text-align: center;    }
    .main{
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        gap: 20px;
    }
    h1{
      transition:all 0.3s ease;
    }
    h1:hover{
      transform:translateY(-5px);
      color:chartreuse;
      box-shadow: 5px 5px 10px aliceblue;
    }
    .card{
        width: 260px;
        background: linear-gradient(to right, skyblue, rgb(203, 135, 235));
        border-radius: 15px;
        padding: 20px;
        border: 5px solid rgb(0, 0, 0);
        transition:all 0.7s ease-out 0.5s;
    }
    .card:hover{
      transform:translate(5px,-7px);
       background:  linear-gradient(to left, skyblue, rgb(203, 135, 235) );
      box-shadow:5px 5px 15px aliceblue ;
    }
    button{
      background-color: aquamarine;
      border-radius: 30px;
      font-family: Arial, Helvetica, sans-serif;
      font-weight: bold;
      padding:10px;
      transition:all 0.9s ease ;

    }
    button:hover{
      background-color: rgb(203, 135, 235);
      transform:translate(5px , -5px);
    }
    .slide-card{
      animation: slideIn 2s ease infinite ; 
    }
    @keyframes slideIn{
      from {
        transform:translateY(-200px);
       }
      to {
        transfrom:translateY(0);
      }
    }
    .bounce-card{
      animation: bounce 1s ease-in  infinite ;
    }
    @keyframes bounce{
      from{
        transform:translateX(-200px);
      }
      to{
        transform:translateX(0);
      }
    }
    .rotate-card{
      position:relative; 
      animation: rotate 2s ease-out 2 ;
    }
    @keyframes rotate{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }
    .pluse-card{
      animation: pluse 2s ease-in-out infinite ;
    }
    @keyframes pluse{
      from{
        transform: scale(0.7);
        opacity:0.7;
      }
      to{
        transform:scale(1);
      }
    }
    .loader{
      border:5px solid #ffffff;
      height:30px;
      width:30px;
      border-radius: 100%;
      margin-left:auto;
      border-top: 5px dotted #ffffff;
      animation: spin 1s ease infinite;
    }
    @keyframes spin{
      from{
        transform:rotate(0deg);
      }
      to{
        transform: rotate(360deg);
      }
    }
    .Blink-card{
      animation: panchak-panchak 1s ease infinite;
    }
    @keyframes panchak-panchak{
      0%{
        opacity: 1;
      }
      50%{
        opacity: 0;
      }
      100%{
        opacity: 1;
      }
    }
</style>
<body>
<h1>
    Animation Examples
</h1>
<div class="main">
    <div class = "card slide-card">
        <h2>Slide card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card bounce-card">
        <h2>Bounce card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card rotate-card">
        <h2>Rotate card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card pluse-card">
        <h2>Pluse card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card ">
      <div class="loader"></div>
        <h2>Loading card</h2>
        <button>Click Me</button>
    </div>
    <div class = "card Blink-card">
        <h2>Blink card</h2>
        <button>Click Me</button>
    </div>
</div>
</body>
</html>
