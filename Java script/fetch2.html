<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        fetch("https://restcountries.com/v3.1/all?fields=name,capital,currencies")
        .then((response) => {
            return response.json();
        })
        // we can display capital, currencies, name (name is a object with keys - common, official )
        .then((data) => {
            let info = data[0];
            let h1 = document.createElement("h1");
            h1.textContent = info.capital;
            document.body.appendChild(h1);
            let h2 = document.createElement("h2");
            h2.textContent = info.name.common;
            document.body.appendChild(h2);
            console.log(info.capital);
            console.log(info.currencies);
        })
    </script>
</body>
</html>
