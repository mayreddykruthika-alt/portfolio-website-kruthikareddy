<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width ,initial-scale=1">
    <title>Counter</title>
    <style>
      body{
        background: linear-gradient( to top, rgb(242, 241, 144), skyblue);
        margin: 0;
        text-align: center;
        font-family: cursive;
        font-weight: bold;
        height: 100vh;
        font-size: 30px;
      }
      label{
        font-size: 90px;
        padding: 10px;
        margin: 5px;
      }
      button{
        font-size: 15px;
        border-radius: 10px;
        width: 80px;
        padding: 10px;
        margin: 30px;
        font-family: cursive;
        font-weight: bold;
        transition:all 0.3s ease-out;
      }
      button:hover{
        transform: scale(1.2);
        box-shadow: 2px 2px 2px black;
        background-color: lightgoldenrodyellow;
      }
    </style>
  </head>
  <body>
    <h1>
      Counter
    </h1>
    <label id="number">0</label>
    <div>
      <button id="raise">Raise</button>
      <button id="clear">Clear</button>
      <button id="down">Down</button>
    </div>
    <script>
      const labelValue = document.getElementById("number");
      const raiseBtn = document.getElementById("raise");
      const clearBth = document.getElementById("clear");
      const downBtn = document.getElementById("down");
      let count=0;
      raiseBtn.onclick = function(){
        count++;
        labelValue.textContent = count;
      }
      clearBth.onclick = function(){
        count=0;
        labelValue.textContent = count; 
      }
      downBtn.onclick = function(){
        count--;
        labelValue.textContent = count; 
      }
    </script>
  </body>
</html>
