<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOSS GAME</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding-top: 50px;
            background-color:  lightpink;
        }
        .controls {
            margin-bottom: 20px;
        }
        button {
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid black;
            border-radius: 5px;
            background-color: white;
            color: black;
            margin: 0 10px;
            transition: all 0.2s;
        }
        button:hover {
            background-color: black;
            color: white;
        }
        .coin {
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            width: 200px;
            height: 200px; 
            background-color: cornsilk;
            margin: 20px auto;
            border: 8px solid black;
            transition: background-color 0.4s ease, transform 0.4s ease;
        }
        #result {
            font-size: 32px; 
            font-weight: bold; 
            margin: 0;
        }
        #status-message {
            font-size: 28px;
            height: 40px;
            margin-top: 20px;
            color: #333;
        }
    </style>
</head>
<body>

    <h2>GUESS THE TOSS</h2>
    <p>Click a button to make your choice:</p>

    <div class="controls">
        <button onclick="playGame('HEAD')">HEAD</button>
        <button onclick="playGame('TAIL')">TAIL</button>
    </div>
    
    <div class="coin" id="coinCircle">
        <p id="result">?</p>
    </div>

    <div id="status-message"></div>

    <script>
        function playGame(userChoice) {
            let random = Math.random(); 
            let flipResult = (random < 0.5) ? "HEAD" : "TAIL";
            
            let coinElement = document.getElementById("coinCircle");
            let resultDisplay = document.getElementById("result");
            let statusMessage = document.getElementById("status-message");
            resultDisplay.textContent = flipResult;

            if (flipResult === "HEAD") {
                coinElement.style.backgroundColor = "lightblue";
            } else {
                coinElement.style.backgroundColor = "lightgreen";
            }

            if (userChoice === flipResult) {
                statusMessage.innerHTML = "YOU WIN!";
                statusMessage.style.color = "darkgreen";
            } else {
                statusMessage.innerHTML = "YOU LOST!";
                statusMessage.style.color = "darkred";
            }
        }
    </script>

</body>
</html>
