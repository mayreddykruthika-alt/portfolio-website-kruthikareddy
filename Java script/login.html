<!DOCTYPE html>
<html>
    <head lang="en">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Login Form</title>
        <style>
            body{
                background: linear-gradient(to right, rgb(168, 201, 228), rgb(245, 245, 159));
                margin: 0;
                height: 100vh;
                text-align: center;
                padding: 20px;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-family: Georgia, serif;
            }
            h1{
                font-size: 80px;
                margin-bottom: 10px;
                letter-spacing: 6px;
                color: #2c3e50;
            }
            .card {
                background: rgba(255, 255, 255, 0.55);
                padding: 40px 50px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.12);
                border-radius: 10px;
            }
            label {
                display: block;
                text-align: left;
                font-size: 13px;
                font-weight: bold;
                margin-bottom: 5px;
            }
            input {
                width: 260px;
                padding: 10px 14px;
                border-radius: 8px;
            }
            .btn{
                padding: 20px 0 5px;
            }
            button {
                padding: 10px 28px;
                border: none;
                border-radius: 8px;
                font-size: 15px;
                cursor: pointer;
                transition: opacity 0.2s;
            }
            button:hover { opacity: 0.85; }
            #login {
                background: #2c3e50;
                color: white;
            }
            #cancel {
                margin-left: 15px;
                background: #e0e0e0;
                color: #444;
            }
            #result {
                margin-top: 12px;
                color: #2c3e50;
            }
        </style>
    </head>
    <body>
        <h1>LOGIN</h1>
        <div class="card">
            <div>
                <label>Username</label>
                <input type="text" id="name">
                <br><br>
                <label>Password</label>
                <input type="password" id="pass">
                <br><br>
            </div>
            <div class="btn">
                <button id="login">Login</button>
                <button id="cancel" style="margin-left: 15px;">Cancel</button>
            </div>
            <h4 id="result"></h4>
        </div>

        <script>
            const userName = document.getElementById("name");
            const password = document.getElementById("pass");
            const cancelbtn = document.getElementById("cancel");
            const loginbtn = document.getElementById("login");
            const message = document.getElementById("result");
            let user1 = "Kanha";
            let pass1 = "krishna@123";
            loginbtn.onclick = function(){
                let userInput = userName.value;
                let passInput = password.value;
                if(userInput === user1 && passInput === pass1){
                    message.textContent = "Login Successful";
                } else if(userInput === "" || passInput ===""){
                    alert("Enter Values");
                } else {
                    alert("Login Failed");
                }
            }        
            cancelbtn.onclick = function(){
                alert("Login Cancel");
            }
        </script>

    </body>
</html>
